name: banglascan_pro
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.0
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_translation: ^0.13.0
  google_mlkit_language_id: ^0.11.0
  permission_handler: ^11.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  pdf: ^3.10.8
  printing: ^5.12.0
  flutter_tts: ^4.0.2
  image_cropper: ^7.0.5
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  path: ^1.9.0
  share_plus: ^7.2.2
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/dictionary/bn_dictionary.json

  fonts:
    - family: Hind Siliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-Light.ttf
          weight: 300
        - asset: assets/fonts/HindSiliguri-Regular.ttf
          weight: 400
        - asset: assets/fonts/HindSiliguri-Medium.ttf
          weight: 500
        - asset: assets/fonts/HindSiliguri-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/HindSiliguri-Bold.ttf
          weight: 700
